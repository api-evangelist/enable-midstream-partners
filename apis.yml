aid: enable-midstream-partners
name: Enable Midstream Partners
description: >-
  Enable Midstream Partners was a midstream energy company engaged in the
  gathering, processing, transportation, and storage of natural gas, natural
  gas liquids, and crude oil. Enable Midstream Partners was acquired by
  Energy Transfer LP in December 2021 and operations have been integrated
  into Energy Transfer's midstream business. No public developer APIs are
  published for this entity.
